<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta property="og:image" content="../images/bg/poster.jpg">
    <meta property="og:title" content="Paintings by Muse Tuan" />
	<title>Paintings by Muse Tuan</title>
    <link href="https://cdn.jsdelivr.net/npm/hje@2.4.6/docs/css/site.heart.css" rel="stylesheet" />
    <link href="../css/current.css" rel="stylesheet" />
    <link id="ph-link-icon" rel="icon" type="image/png" href="../images/logos/logo-2026-paint.png" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/hje@2.4.6/docs/js/mdblogs.js" ></script>
	<script type="text/javascript" src="../js/current.js" ></script>
    <style type="text/css">
    section.x-main-container {
        margin-bottom: 100px;
    }
    section.x-main-container > main {
        min-height: 420px;
    }
    section.x-zone-hl > h1 {
        font-size: 20px; font-weight: normal;
    }
    section.x-zone-hl > h1 > img, section.x-zone-hl > h1 > span {
        vertical-align: middle;
    }
    section > section + section + section.x-zone-hl:has(> h1) {
        margin-top: 80px;
    }
    section.x-zone-hl > h1 > span {
        cursor: text; user-select: text;
    }
    section.x-zone-hl > h1 > span + span {
        color: rgba(240, 240, 240, 0.6); font-size: 16px; font-weight: lighter; margin-left: 20px;
    }
    section > h1 > img:first-child {
        width: 32px; height: 32px; margin-right: 10px;
    }
    section.x-zone-actions > div {
        margin-bottom: 20px; user-select: none;
    }
    section.x-part-copyright-tuans {
        padding: 24px 0 24px 0; border-width: 1px 0 1px 0; border-style: solid none solid none; border-color: #333;
    }
    section.x-main-container span.x-text-subtitle,
    section.x-zone-hl + section > span.grouping-header {
        color: #888; margin-top: 20px; margin-bottom: 10px; display: block; user-select: none;
    }
    section.x-part-panel {
        padding: 19px; border: 1px solid #333; border-radius: 8px; user-select: none;
    }
    section.x-part-panel > h2 {
        font-size: 16px; font-weight: normal; line-height: 20px; padding: 0; margin: 0 0 20px 0; cursor: default;
    }
    section.x-part-panel > h2 > img:first-child {
        width: 20px; height: 20px; margin-right: 10px; opacity: 0.9;
    }
    section.x-part-panel > h2 > img, section.x-part-panel > h2 > span {
        vertical-align: middle;
    }
    section#section-works-greetings {
        cursor: default; user-select: none;
    }
    section#section-works-greetings > span, section#section-works-greetings > a {
        display: inline-block;
    }
    section.x-part-blog-related > h2 {
        padding: 15px 0 0 0; border-top: 1px solid #333; cursor: default; user-select: none;
    }
    section.x-part-blog-related > ul.link-tile-compact, section.x-part-blog-related > ul.link-tile-compact > li {
        list-style: none;
    }
    section.x-part-blog-share > h2:first-child + div > img {
        width: 160px; height: 160px; border-radius: 4px; opacity: 0.9;
    }
    section.x-part-blog-share > div.x-part-blog-note {
        color: #CCC; font-size: 16px; width: 780px; height: 200px; padding: 0 0 0 30px; margin-top: 0; border-width: 0 0 0 1px; border-style: none none none solid; border-color: #444;
        position: absolute; top: 24px; left: 219px; right: 20px; user-select: text;
    }
    section.x-part-blog-share > div.x-part-blog-note > p, section.x-part-blog-note > p {
        margin: 10px 0;
    }
    section.x-part-blog-share > div.x-part-blog-note > p:first-child, section.x-part-blog-note > p:first-child {
        margin-top: 0;
    }
    section.x-part-blog-share > div.x-part-blog-note > p:last-child, section.x-part-blog-note > p:last-child {
        margin-bottom: 0;
    }
    section.x-part-greetings > span:first-child {
        color: #999; line-height: 20px;
    }
    section.x-part-greetings > span:first-child + span {
        color: red; margin-left: 10px;
    }
    section.x-part-greetings > span:first-child + span + a {
        padding-left: 20px; margin-left: 20px; border-left: 1px solid #444;
    }
    section.x-part-copyright-notice {
        color: #666; cursor: default; user-select: none;
    }
    @media screen and (max-width:1110px) {
    section.x-part-blog-share > div.x-part-blog-note {
        width: auto; right: 30px;
    }
    }
    @media screen and (max-width:860px) {
    section.x-part-blog-share > div.x-part-blog-note {
        width: 100%; height: auto; padding: 14px 0 0 0; margin-top: 15px; border-width: 1px 0 0 0; border-style: solid none none none; border-color: #333;
        position: relative; top: 0; left: 0;
    }
    section.x-part-greetings > span:first-child + span + a {
        width: 160px; padding-left: 0; margin-left: 0; border-left: 0 none transparent; display: block;
    }
    section.x-part-greetings > span:first-child + span + a::before {
        color: #666; content: "[";
    }
    section.x-part-greetings > span:first-child + span + a::after {
        color: #666; content: "]";
    }
    }
    </style>
</head>
<body onload="PageCtrl.initPaint()">
	<header>
        <section>
            <h1><img alt="Muse Tuan" src="../images/logos/logo-2026-paint.png" /><a href="https://musetuan.com"><strong>Muse</strong><span>Tuan.com</span></a></h1>
            <ul id="top-menu" >
            </ul>
        </section>
	</header>
    <section id="main-container" class="x-main-container" >
        <section>
			<a href="./" class="link-long-button"><span>General</span></a>
            <span class="x-text-subtitle">Series</span>
			<a href="./?mao" class="link-long-button"><span>摸凹喵</span><span><span class="x-text-cap-small">Mor-Ow Meow</span></span></a>
        </section>
    </section>
	<section class="x-part-content x-bg-emphasis x-part-copyright-tuans">
		<section>
			<img alt="Tuans" src="../images/logos/tuans.png" />
		</section>
	</section>
	<section class="x-part-content">
		<section class="x-part-copyright-notice">
			<span>Original &nbsp; | &nbsp; 原创图画</span>
		</section>
	</section>
	<footer>
		<section>
			<div class="x-copyright">
                <img title="musetuan.com" src="../images/logos/barcode.svg" />
                <span>&copy; 2025 Muse Tuan &amp; Kingcean Tuan</span>
                <span>CC BY-NC-ND 4.0</span>
            </div>
		</section>
	</footer>
    <div id="popup-view" style="display: none; " >
        <div class="priority-backup"><img id="popup-view-thumb"></div><div class="priority-main"><img id="popup-view-img"></div><div class="priority-subtitle"><strong id="popup-view-title"></strong><br /><span id="popup-view-desc"></span></div>
    </div>
</body>
</html>
